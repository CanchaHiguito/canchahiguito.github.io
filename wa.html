<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro Deportivo Higuito</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h2 { color: #F9A825; font-size: 22px; font-weight: 900; letter-spacing: 3px; margin-bottom: 8px; }
    p { color: #fff; font-size: 14px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">⚽</div>
  <h2>HIGUITO</h2>
  <p>Abriendo WhatsApp...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const mensaje = params.get('msg') || 'Hola, vi la promo de Higuito y quiero más información ⚽';
    const numero = '50663159767';
    const url = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(mensaje);
    setTimeout(function() {
      window.location.href = url;
    }, 800);
  </script>
</body>
</html>
