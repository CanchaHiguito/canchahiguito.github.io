<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro Deportivo Higuito</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h2 { color: #F9A825; font-size: 22px; font-weight: 900; letter-spacing: 3px; margin-bottom: 8px; }
    .subtitulo { color: #fff; font-size: 13px; opacity: 0.7; margin-bottom: 24px; }
    .msg-box { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 24px; width: 100%; max-width: 340px; }
    .msg-box p { color: #fff; font-size: 14px; line-height: 1.6; }
    .btn-wa { background: #25D366; color: #fff; border: none; padding: 18px 32px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; width: 100%; max-width: 340px; }
  </style>
</head>
<body>
  <div class="logo">⚽</div>
  <h2>HIGUITO</h2>
  <p class="subtitulo">Tu mensaje para el encargado:</p>
  <div class="msg-box">
    <p id="msg-preview"></p>
  </div>
  <a id="wa-btn" class="btn-wa" href="#">💬 Abrir WhatsApp</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mensaje = params.get('msg') || 'Hola, vi la promo de Higuito y quiero más información ⚽';
    const numero = '50663159767';
    document.getElementById('msg-preview').textContent = mensaje;
    const appUrl = 'whatsapp://send?phone=' + numero + '&text=' + encodeURIComponent(mensaje);
    document.getElementById('wa-btn').href = appUrl;
  </script>
</body>
</html>
